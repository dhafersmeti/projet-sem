# ===== Base de données MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/recrutement_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Serveur =====
server.port=8080

# ===== JWT =====
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ===== Upload de fichiers CV =====
app.upload.dir=uploads/cvs
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Email (SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:noreply@recruittracker.com}
spring.mail.password=${MAIL_PASS:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@recruittracker.com
# Mettre à true pour envoyer réellement les emails, false pour juste logger
app.mail.enabled=false

# ===== Logs =====
logging.level.com.recrutement=DEBUG
